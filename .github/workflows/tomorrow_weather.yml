name: 明日天气推送

on:
  schedule:
    # 北京时间 18:00 = UTC 10:00
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  push-tomorrow-weather:
    runs-on: ubuntu-latest

    env:
      WX_WEBHOOK: ${{ secrets.WX_WEBHOOK }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_NAME }}
      CITY_CODE: ${{ secrets.CITY_CODE }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 检查文件
        run: |
          echo "📁 当前目录文件:"
          ls -la
          echo ""
          if [ -f "weather.py" ]; then
            echo "✅ weather.py 存在"
          else
            echo "❌ weather.py 不存在"
            exit 1
          fi

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 检查环境变量
        run: |
          echo "🕐 UTC时间: $(date -u)"
          echo "🕐 北京时间: $(TZ='Asia/Shanghai' date)"
          echo "🌙 任务类型: 明日天气推送"
          echo "🏢 COMMUNITY_NAME: ${COMMUNITY_NAME:-未设置}"
          echo "🏙️ CITY_CODE: ${CITY_CODE:-未设置}"

          if [ -z "$WX_WEBHOOK" ]; then
            echo "❌ WX_WEBHOOK 未配置"
            exit 1
          fi

      - name: 运行明日天气脚本
        run: |
          echo "🚀 开始推送明日天气..."
          python weather.py tomorrow

      - name: 执行完成
        if: always()
        run: |
          echo "✅ 明日天气推送任务执行完毕"
