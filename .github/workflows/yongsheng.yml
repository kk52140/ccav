name: 永升天气推送

on:
  schedule:
    # 中国时间下午5:30
    # GitHub 使用 UTC 时间
    # 北京时间 17:30 = UTC 09:30
    - cron: '30 9 * * *'

  workflow_dispatch:

jobs:
  yongsheng-weather:

    runs-on: ubuntu-latest

    env:
      WX_WEBHOOK: ${{ secrets.WX_YONGSHENG }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_bochenfu }}
      CITY_CODE: 101070101

    steps:

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunar-python

      - name: 查看当前文件
        run: |
          echo "===== 根目录 ====="
          ls -la

          echo "===== yongsheng目录 ====="
          ls -la yongsheng

      - name: 显示运行时间
        run: |
          echo "UTC时间:"
          date -u

          echo "北京时间:"
          TZ='Asia/Shanghai' date

      - name: 执行永升天气推送
        run: |
          python yongsheng/weather_yongsheng.py tomorrow

      - name: 执行完成
        if: always()
        run: |
          echo "✅ 永升天气推送完成"
