name: 永升天气推送

on:
  schedule:
    - cron: '30 9 * * *'

  workflow_dispatch:

jobs:
  push-weather:
    runs-on: ubuntu-latest

    env:
      WX_WEBHOOK: ${{ secrets.WX_WEBHOOK }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_NAME }}
      CITY_CODE: ${{ secrets.CITY_CODE }}

    steps:

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行天气脚本
        run: |
          python weather.py tomorrow
