name: 永升天气推送

on:
  schedule:
    # 中国时间下午5:30
    - cron: '30 9 * * *'

  workflow_dispatch:

jobs:

  yongsheng-weather:

    runs-on: ubuntu-latest

    env:
      WX_YONGSHENG: ${{ secrets.WX_YONGSHENG }}
      COMMUNITY_NAME: ${{ secrets.COMMUNITY_BOCHENFU }}
      CITY_CODE: ${{ secrets.CITY_CODE }}

    steps:

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests lunar-python

      - name: 检查环境变量
        run: |
          echo "检查变量..."
          
          if [ -z "$WX_YONGSHENG" ]; then
            echo "❌ WX_YONGSHENG 未读取到"
            exit 1
          else
            echo "✅ WX_YONGSHENG 已读取"
          fi

      - name: 执行天气推送
        run: |
          python yongsheng/weather_yongsheng.py

      - name: 完成
        if: always()
        run: |
          echo "✅ 永升天气推送结束"
