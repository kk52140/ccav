name: 天气推送

on:
  schedule:
    # 每天早上7:30推送今日天气
    - cron: '30 7 * * *'
    # 每天晚上18:00推送明日天气  
    - cron: '0 18 * * *'
  # 支持手动触发
  workflow_dispatch:
    inputs:
      weather_type:
        description: '天气类型 (today/tomorrow)'
        required: true
        default: 'tomorrow'

jobs:
  push-weather:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2
      
      - name: 设置Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行天气脚本
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            if [ "${{ github.event.schedule }}" == "30 7 * * *" ]; then
              python weather.py today
            else
              python weather.py tomorrow
            fi
          else
            python weather.py ${{ github.event.inputs.weather_type }}
          fi
