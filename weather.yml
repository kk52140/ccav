name: 天气推送

on:
  schedule:
    # 每天早上7:30推送今日天气
    - cron: '30 7 * * *'
    # 每天晚上18:00推送明日天气  
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      weather_type:
        description: '天气类型 (today/tomorrow)'
        required: true
        default: 'tomorrow'

jobs:
  push-today-weather:
    if: github.event.schedule == '30 7 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.weather_type == 'today')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2
      
      - name: 设置Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行今日天气
        run: python weather.py today

  push-tomorrow-weather:
    if: github.event.schedule == '0 18 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.weather_type == 'tomorrow')
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v2
      
      - name: 设置Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      
      - name: 安装依赖
        run: pip install requests
      
      - name: 运行明日天气
        run: python weather.py tomorrow
